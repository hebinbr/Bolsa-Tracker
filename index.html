<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolsa Tracker</title>
    <script>
      // Workaround for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This happens in some environments when libraries try to polyfill fetch.
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.warn('Something tried to overwrite window.fetch'); },
            configurable: true
          });
        }
      } catch (e) {
        console.warn('Failed to protect fetch:', e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
